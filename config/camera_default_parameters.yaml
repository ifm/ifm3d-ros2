# Example configuration for one camera
# Expected to be used with camera.launch.py using default name and namespace

/ifm3d/camera:
  ros__parameters:
    config_file: "" #"config/o3r_configs/o3r_one_head_calibration_only.json"  # Optional: path to JSON configuration file
    buffer_id_list:
      - CONFIDENCE_IMAGE
      - EXTRINSIC_CALIB
      - INTRINSIC_CALIB
      - INVERSE_INTRINSIC_CALIBRATION
      - JPEG_IMAGE
      - NORM_AMPLITUDE_IMAGE
      - RADIAL_DISTANCE_IMAGE
      - RADIAL_DISTANCE_NOISE
      - REFLECTIVITY
      - RGB_INFO
      - TOF_INFO
      - XYZ
    ip: 192.168.0.69
    pcic_port: 50012  # port2 of the VPU
    publish_uncompressed: true  # If true, launch will spawn a republish node to provide rgb_uncompressed image only for RGB
    tf:
      base_frame_name: "ifm_base_link"
      mounting_frame_name: "camera_mounting_link"
      optical_frame_name: "camera_optical_link"
      publish_base_to_mounting: true
      publish_mounting_to_optical: true
    use_sim_time: false
    xmlrpc_port: 80
