.publish_rules:
  rules:
    # 1️⃣ Run automatically on semantic version tags (vX.Y.Z)
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success

    # 2️⃣ On merge requests, show manual trigger button and tag image as 'dev'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true

    # 3️⃣ All other pipelines → do not run
    - when: never
